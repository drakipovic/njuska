name: njuskalo-watch

on:
  schedule:
    - cron: "*/15 * * * *"   # GH cron je UTC i zna kasnit 5-30 min
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: njuskalo-watch
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install --no-audit --no-fund

      - run: npm run watch
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: commit state
        if: always()
        run: |
          git config user.name  "njuskalo-watch"
          git config user.email "actions@users.noreply.github.com"
          git add state/seen.json
          git diff --staged --quiet || (git commit -m "state: $(date -u +%FT%TZ)" && git push)
